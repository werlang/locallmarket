services:
  worker:
    build: .
    ports:
      - 127.0.0.1:3000:3000
    env_file: .env
    volumes:
      - .:/app
      - node_modules_worker:/app/node_modules
    restart: unless-stopped
    networks:
      - llm
    command: npm start
    deploy:
      replicas: ${WORKER_REPLICAS:-1}
volumes:
  node_modules_api:
  node_modules_worker:
networks:
  llm:
    external: true
